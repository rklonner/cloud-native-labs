apiVersion: tekton.dev/v1beta1
kind: PipelineRun
metadata:
  generateName: clone-build-push-
spec:
  pipelineRef:
    name: clone-build-push
  podTemplate:
    securityContext:
      fsGroup: 65532
  workspaces:
  - name: source
    volumeClaimTemplate:
      spec:
        accessModes:
        - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
  - name: dockerconfig
    secret:
      secretName: harbor-creds
      items:
      - key: .dockerconfigjson  # Das ist der Key, den 'kubectl create secret docker-registry' erzeugt
        path: config.json       # Das ist der Dateiname, den der Buildah-Task im Container erwartet
  params:
  - name: repo-url
    value: https://github.com/rklonner/cloud-native-labs.git
  - name: dockerfile
    value: ./tekton/build-image-push-to-harbor/Dockerfile
  - name: image-name
    value: harbor.harbor.svc.cluster.local/library/my-image